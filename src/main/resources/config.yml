# SimplePolls Configuration

# Database settings
database:
  url: "jdbc:mysql://localhost:3306/simplepolls"
  username: "root"
  password: "password"
  maxPoolSize: 10
  
  # HikariCP settings
  pool:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000

# Plugin settings
settings:
  # Maximum number of poll options (1-6)
  maxPollOptions: 6
  # Default poll duration in minutes (0 = no limit)
  defaultDuration: 0
